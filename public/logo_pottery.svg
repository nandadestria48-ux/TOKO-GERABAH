<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F5DEB3" stroke="#8B4513" stroke-width="3"/>
  
  <!-- Pottery vase/pot shape -->
  <g transform="translate(100, 80)">
    <!-- Main pot body -->
    <path d="M -25 20 Q -30 30 -30 45 L -30 60 Q -30 70 -20 75 L 20 75 Q 30 70 30 60 L 30 45 Q 30 30 25 20 Z" 
          fill="#CD7F32" stroke="#8B4513" stroke-width="2"/>
    
    <!-- Pot rim/neck -->
    <path d="M -20 15 Q -25 10 -20 5 L 20 5 Q 25 10 20 15 Z" 
          fill="#D2691E" stroke="#8B4513" stroke-width="2"/>
    
    <!-- Pot handle -->
    <path d="M 20 25 Q 45 25 45 50" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Decorative pattern -->
    <circle cx="-10" cy="40" r="2" fill="#8B4513"/>
    <circle cx="0" cy="45" r="2" fill="#8B4513"/>
    <circle cx="10" cy="40" r="2" fill="#8B4513"/>
  </g>
  
  <!-- Small decorative flower/leaf -->
  <g transform="translate(60, 140)">
    <path d="M 0 -8 Q 5 -5 8 0 Q 5 5 0 8 Q -5 5 -8 0 Z" fill="#A0522D"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="180" font-family="Georgia, serif" font-size="18" font-weight="bold" 
        text-anchor="middle" fill="#8B4513">Gerabah</text>
</svg>